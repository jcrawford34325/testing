<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Days Until I Don't Get a Cybertruck</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: clamp(1.4rem, 4vw, 2.4rem);
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #c0c0c0;
        margin-bottom: 3rem;
        line-height: 1.3;
      }

      h1 span {
        color: #ff4444;
        display: block;
      }

      .timer {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 3rem;
      }

      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .value {
        font-size: clamp(3rem, 10vw, 6rem);
        font-weight: 900;
        color: #ffffff;
        min-width: 2ch;
        line-height: 1;
        text-shadow: 0 0 30px rgba(255,255,255,0.15);
      }

      .label {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #666;
      }

      .divider {
        font-size: clamp(3rem, 10vw, 6rem);
        font-weight: 900;
        color: #333;
        align-self: flex-start;
        margin-top: 0.1em;
      }

      .subtitle {
        font-size: 0.85rem;
        color: #444;
        letter-spacing: 0.1em;
      }

      .cybertruck {
        font-size: clamp(4rem, 15vw, 8rem);
        margin-bottom: 1rem;
        filter: grayscale(1) opacity(0.3);
      }
    </style>
  </head>
  <body>
    <div class="cybertruck">🚛</div>

    <h1>Days Until I <span>Don't Get a Cybertruck</span></h1>

    <div class="timer">
      <div class="unit">
        <div class="value" id="days">000</div>
        <div class="label">Days</div>
      </div>
      <div class="divider">:</div>
      <div class="unit">
        <div class="value" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="divider">:</div>
      <div class="unit">
        <div class="value" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="divider">:</div>
      <div class="unit">
        <div class="value" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div class="subtitle">
      Target: April 25, 2031 &nbsp;|&nbsp; Still not getting one
    </div>

    <script>
      const target = new Date('2031-04-25T00:00:00').getTime();

      function pad(n, width = 2) {
        return String(n).padStart(width, '0');
      }

      function tick() {
        const now = Date.now();
        const diff = target - now;

        if (diff <= 0) {
          document.querySelector('h1').innerHTML = 'I Still Didn\'t Get a Cybertruck';
          document.querySelector('.timer').innerHTML = '<div class="value" style="font-size:4rem">🎉</div>';
          return;
        }

        const totalSeconds = Math.floor(diff / 1000);
        const seconds = totalSeconds % 60;
        const minutes = Math.floor(totalSeconds / 60) % 60;
        const hours   = Math.floor(totalSeconds / 3600) % 24;
        const days    = Math.floor(totalSeconds / 86400);

        document.getElementById('days').textContent    = pad(days, 4);
        document.getElementById('hours').textContent   = pad(hours);
        document.getElementById('minutes').textContent = pad(minutes);
        document.getElementById('seconds').textContent = pad(seconds);
      }

      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
